<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入機電競介紹</title>
    <style>
        :root {
            --bg-pink: #ffafbd;
            --bg-blue: #2193b0;
            --title-color: #7B68EE;
            --gold-color: #ffd700;
            --text-grad-start: #1A237E;
            --text-grad-end: #7B1FA2;
            /* 電競霓虹深色系 */
            --neon-deep-blue: #0019ff;
            --neon-deep-purple: #4b0082;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-pink), var(--bg-blue));
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; cursor: crosshair;
        }

        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- 深藍配紫漸層流線外框 --- */
        .outer-neon-frame {
            position: relative;
            z-index: 10;
            padding: 5px; /* 線條寬度 */
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 25, 255, 0.5);
        }

        .outer-neon-frame::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(
                transparent, 
                var(--neon-deep-blue), 
                var(--neon-deep-purple), 
                #00f2ff, 
                transparent 40%
            );
            animation: rotateFrame 4s linear infinite;
        }

        @keyframes rotateFrame {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 主卡片內容 */
        .gui-container {
            position: relative; 
            width: 100%; 
            max-width: 600px; 
            max-height: 85vh;
            background: rgba(245, 245, 245, 0.85); 
            backdrop-filter: blur(15px);
            border-radius: 20px; 
            padding: 35px; 
            overflow-y: auto; 
            text-align: center;
            z-index: 11;
        }

        /* --- 霓虹燈標題特效 --- */
        .neon-flicker {
            animation: flicker 2s infinite alternate;
            text-shadow: 0 0 7px #fff, 0 0 15px var(--neon-deep-blue), 0 0 30px var(--neon-deep-purple);
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.6; text-shadow: none; }
        }

        /* --- 原始文字樣式與動畫 --- */
        .main-title, .price-list-title, .gold-title, .devil-title, li, .highlight-box {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }
        .main-title:hover { transform: scale(1.15); text-shadow: 0 0 20px var(--title-color); color: #fff; }
        .main-title { font-size: 2.5rem; font-weight: bold; color: var(--title-color); margin-bottom: 20px; letter-spacing: 5px; }
        .price-list-title { font-size: 1.8rem; font-weight: bold; background: linear-gradient(to bottom, var(--text-grad-start), var(--text-grad-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stream-line { width: 100%; height: 2px; margin: 25px 0; background: rgba(255, 255, 255, 0.3); position: relative; overflow: hidden; }
        .stream-line::after { content: ""; position: absolute; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, #fff, transparent); animation: flow 3s linear infinite; }
        @keyframes flow { 100% { left: 100%; } }
        .gold-title { color: var(--gold-color); font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px #ffcc00; margin: 15px 0; }
        .devil-title { background: linear-gradient(to right, #000, #f00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5rem; font-weight: 900; margin: 15px 0; }
        .content-text { background: linear-gradient(45deg, var(--text-grad-start), var(--text-grad-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; list-style: none; padding: 0; line-height: 1.6; }
        .highlight-box { padding: 8px 15px; background: rgba(255, 255, 255, 0.2); width: fit-content; margin: 10px auto; border-radius: 8px; }
        .contact-btn { padding: 15px 40px; background: linear-gradient(to right, var(--title-color), var(--bg-blue)); color: white; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }
        li:hover { background: rgba(123, 104, 238, 0.2); transform: translateX(10px); color: #fff !important; cursor: pointer; }

        /* 流星樣式 (原版 V4) */
        .shooting-star-v4 {
            position: absolute; height: 3px; background: linear-gradient(-45deg, #fff, rgba(0,0,255,0));
            filter: drop-shadow(0 0 10px #fff); border-radius: 999px; pointer-events: none; transform-origin: left center;
        }

        .ripple { position: fixed; border: 2px solid #fff; background: rgba(255,255,255,0.1); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; animation: rip 0.8s ease-out forwards; z-index: 999998; }
        @keyframes rip { from { width: 0; height: 0; opacity: 0.8; } to { width: 150px; height: 150px; opacity: 0; } }

        /* 設定選單 */
        .side-gui {
            position: fixed; left: -260px; top: 50%; transform: translateY(-50%);
            width: 210px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border-radius: 0 25px 25px 0;
            padding: 25px; z-index: 1000000; transition: 0.5s;
        }
        .side-gui.active { left: 0; }
        .gui-toggle {
            position: absolute; right: -45px; top: 50%; transform: translateY(-50%);
            width: 45px; height: 100px; background: rgba(0, 0, 0, 0.85); border-radius: 0 15px 15px 0;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: white;
        }
        .btn-toggle { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="fx-layer"></div>

    <audio id="bgMusic" loop>
        <source src="https://archive.org/download/soundcloud-1412271310/soundcloud-1412271310.mp3" type="audio/mpeg">
    </audio>

    <div class="side-gui" id="sideGui">
        <div class="gui-toggle" onclick="this.parentElement.classList.toggle('active')">⚙️</div>
        <h3 style="color:white; text-align:center;">特效設定</h3>
        <button class="btn-toggle" onclick="setEffect('stars', this)">✨</button>
        <button class="btn-toggle" onclick="setEffect('shooting', this)">☄️</button>
        <button class="btn-toggle" style="background:rgba(255,0,0,0.3)" onclick="setEffect('none', this)">❌</button>
    </div>

    <div class="outer-neon-frame">
        <div class="gui-container">
            <div class="main-title neon-flicker">入機電競介紹</div>
            <div class="price-list-title">入機電競價目表</div>

            <div class="stream-line"></div>
            <div class="gold-title">金牌打手</div>
            <ul class="content-text">
                <li>體驗單: 5</li>
                <li>普壩保底 200 萬</li>
                <li>普壩清圖</li>
            </ul>

            <div class="stream-line"></div>
            <ul class="content-text">
                <li>抖音單: 10</li>
                <li>普壩保底 400 萬 / 機壩保底 200 萬</li>
                <div class="highlight-box">
                    <span class="content-text">老闆龜撤離滑抖音打手投餵</span>
                </div>
            </ul>

            <div class="stream-line"></div>
            <div class="devil-title">入機魔王護</div>
            <ul class="content-text">
                <li>清圖單: 20</li>
                <li>普壩保底 600 萬</li>
                <li>不清圖不撤</li>
            </ul>

            <div class="stream-line"></div>
            <ul class="content-text">
                <li>壓力單: 15/場</li>
                <li>保底0</li>
                <li>打手幫起裝給老闆打</li>
            </ul>

            <div class="stream-line"></div>
            <button class="contact-btn" onclick="window.open('https://discord.gg/cqK3ADZAp')">立即預約下單</button>

            <div class="footer-note content-text">
                入機電競打手有一切壓力老闆的權力，若老闆不服就受著
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        let musicStarted = false;
        
        document.addEventListener('click', (e) => {
            if(!musicStarted) {
                audio.play().catch(err => console.log("音樂播放受限"));
                musicStarted = true;
            }
            spawnRipple(e);
        });

        function spawnRipple(e) {
            const rip = document.createElement('div');
            rip.className = 'ripple';
            rip.style.left = e.clientX + 'px';
            rip.style.top = e.clientY + 'px';
            document.body.appendChild(rip);
            setTimeout(() => rip.remove(), 800);
        }

        /* --- 原版流星特效邏輯 --- */
        let effectInterval = null;
        let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        function setEffect(type, btn) {
            clearInterval(effectInterval);
            document.getElementById('fx-layer').innerHTML = '';
            if(type === 'none') return;

            const layer = document.getElementById('fx-layer');
            if (type === 'stars') {
                for(let i=0; i<80; i++) {
                    let s = document.createElement('div');
                    s.style.position = 'absolute'; s.style.background = 'white';
                    s.style.borderRadius = '50%'; s.style.width = s.style.height = Math.random()*3+'px';
                    s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
                    s.style.opacity = Math.random(); layer.appendChild(s);
                }
            }

            if (type === 'shooting') {
                effectInterval = setInterval(() => {
                    const batch = Math.floor(Math.random() * 8) + 5; 
                    for(let i=0; i<batch; i++){
                        let s = document.createElement('div');
                        s.className = 'shooting-star-v4';
                        const side = Math.floor(Math.random() * 4);
                        let sx, sy;
                        if(side === 0) { sx = -100; sy = Math.random() * window.innerHeight; }
                        else if(side === 1) { sx = window.innerWidth + 100; sy = Math.random() * window.innerHeight; }
                        else if(side === 2) { sx = Math.random() * window.innerWidth; sy = -100; }
                        else { sx = Math.random() * window.innerWidth; sy = window.innerHeight + 100; }
                        
                        s.style.left = sx + 'px'; s.style.top = sy + 'px';
                        const angle = Math.atan2(mouseY - sy, mouseX - sx);
                        s.style.transform = `rotate(${angle}rad)`;
                        s.style.width = '0px'; 
                        layer.appendChild(s);

                        const duration = Math.random() * 800 + 600;
                        s.animate([
                            { width: '0px', opacity: 1 },
                            { width: '200px', opacity: 1, offset: 0.2 },
                            { transform: `translate(${(mouseX-sx)}px, ${(mouseY-sy)}px) rotate(${angle}rad)`, width: '10px', opacity: 0 }
                        ], { duration: duration, easing: 'ease-out' }).onfinish = () => s.remove();
                    }
                }, 200);
            }
        }

        window.onload = () => setEffect('shooting');
    </script>
</body>
</html>
